<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- SquareBerry Favicon: Square shape + Berry accent -->
  <!-- Background square with rounded corners -->
  <rect x="2" y="2" width="28" height="28" rx="6" ry="6" fill="#C03030"/>
  <!-- Inner white square representing land/parcel -->
  <rect x="8" y="8" width="16" height="16" rx="2" ry="2" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.9"/>
  <!-- Crosshair lines inside the parcel -->
  <line x1="16" y1="9" x2="16" y2="23" stroke="#fff" stroke-width="1" opacity="0.4"/>
  <line x1="9" y1="16" x2="23" y2="16" stroke="#fff" stroke-width="1" opacity="0.4"/>
  <!-- Berry dot in center -->
  <circle cx="16" cy="16" r="3" fill="#D4A843"/>
  <!-- Tiny leaf on the berry -->
  <path d="M16 13.5 C16.8 12 18 11.5 18 11.5 C17 12.5 16.5 13.5 16 13.5Z" fill="#2B5E3A"/>
</svg>
